<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="button.css">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap');
    </style>
</head>
<body>
    <header>
        <div>My Book Library</div>
        <button class="button glow" id="AddBtn">
            Add Book
            <svg class="glow-container">
                <rect width="100%" height="100%" pathLength="100" stroke-linecap="round" class="glow-blur"></rect>
                <rect width="100%" height="100%" pathLength="100" stroke-linecap="round" class="glow-line"></rect>
            </svg>
        </button>
        
    </header>

    <main id="main">
        
        
    </main>

    <dialog id="my-dialog" >
        <form>
            <div>
                <label for="Name">Name of the book</label>
                <input type="text">
            </div>
            <div>
                <label for="Author">Author of the book</label>
                <input type="text">
            </div>
            <div>
                <label for="Pages">Number of pages</label>
                <input type="number">
            </div>
            <div class="checkbox">
                <label for="Read">Has it been read?</label>
                <input type="checkbox">
            </div>
        </form>
        <div>
            <button id="closeBtn">Close</button>
            <!-- <button id="submit">Submit</button> -->
             <input type="submit" id="submit" value="Submit">
        </div>
        
    </dialog>

</body>
<script src="script.js"></script>
<script src="button.js"></script>
</html>
